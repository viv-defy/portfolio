title: Vishnu
description: Portfolio + second brain

# GitHub Pages runs Jekyll for you. We keep this repo dependency-free
# by using a small custom layout (no remote theme gem required).

markdown: kramdown

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: notes
    values:
      layout: note
